name: 🤖 Auto-label Story PRs

on:
  pull_request_target:
    paths:
      - 'golpo/**'

permissions:
  pull-requests: write
  issues: write
  contents: read
  checks: read

jobs:
  label-pr:
    name: 📌 Label & Comment
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Add labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            
            const storyFiles = files.filter(f => f.filename.startsWith('golpo/') && f.filename.endsWith('.md'));
            
            if (storyFiles.length > 0) {
              // Add label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['📖 new-story', 'content'],
              });
              
              // Add welcome comment
              const authorDirs = new Set(storyFiles.map(f => f.filename.split('/')[1]));
              const storyNames = storyFiles.map(f => {
                const parts = f.filename.split('/');
                return parts[parts.length - 1].replace('.md', '');
              });
              
              const comment = [
                `## 📖 নতুন গল্প যোগ হচ্ছে!`,
                ``,
                `ধন্যবাদ গল্পের.পাতায় অবদান রাখার জন্য! 🎉`,
                ``,
                `**যোগ করা হচ্ছে:**`,
                storyNames.map(n => `- 📄 ${n}`).join('\n'),
                ``,
                `**লেখক ফোল্ডার:** ${Array.from(authorDirs).join(', ')}`,
                ``,
                `---`,
                `*এই PR মার্জ হলে গল্প${storyNames.length > 1 ? 'গুলো' : 'টি'} স্বয়ংক্রিয়ভাবে সাইটে প্রকাশিত হবে!*`
              ].join('\n');
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: comment,
              });
            }
